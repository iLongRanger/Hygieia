<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Hygieia — operations for clean spaces">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f1c"/>
      <stop offset="55%" stop-color="#0e2a26"/>
      <stop offset="100%" stop-color="#081814"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.78" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#9fc8b6" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#9fc8b6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#9fc8b6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e9e2cf" stroke-opacity="0.04" stroke-width="0.6"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.89  0 0 0 0 0.81  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#ground)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect width="1280" height="360" fill="url(#halo)"/>
  <rect width="1280" height="360" filter="url(#grain)" opacity="0.6"/>

  <!-- corner brackets -->
  <g stroke="#e9e2cf" stroke-opacity="0.55" stroke-width="1" fill="none">
    <path d="M40 40 H72 M40 40 V72"/>
    <path d="M1240 40 H1208 M1240 40 V72"/>
    <path d="M40 320 H72 M40 320 V288"/>
    <path d="M1240 320 H1208 M1240 320 V288"/>
  </g>

  <!-- tiny eyebrow -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="4" fill="#9fc8b6">
    <text x="80" y="110">EST. MMXXVI · OPERATIONS PLATFORM</text>
  </g>

  <!-- wordmark -->
  <g font-family="'Cormorant Garamond', 'EB Garamond', 'Playfair Display', Didot, Georgia, serif" fill="#f1ead6">
    <text x="78" y="220" font-size="156" font-weight="500" letter-spacing="-3">Hygieia</text>
  </g>

  <!-- italic tagline -->
  <g font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif" font-style="italic" fill="#cfd8c8" font-size="22">
    <text x="82" y="262">a quiet system for the work of clean spaces.</text>
  </g>

  <!-- divider + meta row -->
  <line x1="80" y1="296" x2="1200" y2="296" stroke="#e9e2cf" stroke-opacity="0.18" stroke-width="0.8"/>
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="#e9e2cf" fill-opacity="0.7">
    <text x="80" y="318">CRM · SALES · CONTRACTS · OPERATIONS · INSPECTIONS · WORKFORCE · BILLING · FINANCE</text>
    <text x="1200" y="318" text-anchor="end">v1 · single-tenant</text>
  </g>

  <!-- mark: bowl + serpent abstraction (rod of Asclepius / Hygieia bowl) -->
  <g transform="translate(1040 175)" stroke="#e9e2cf" fill="none" stroke-linecap="round">
    <!-- vessel bowl -->
    <path d="M-72 0 q72 90 144 0" stroke-width="1.2" stroke-opacity="0.85"/>
    <line x1="-86" y1="0" x2="86" y2="0" stroke-width="1.2" stroke-opacity="0.85"/>
    <!-- rim notches -->
    <line x1="-86" y1="-6" x2="-86" y2="6" stroke-width="1.2" stroke-opacity="0.85"/>
    <line x1="86" y1="-6" x2="86" y2="6" stroke-width="1.2" stroke-opacity="0.85"/>
    <!-- serpent coil -->
    <path d="M0 -120 C 28 -100, -28 -70, 0 -50 C 28 -30, -28 -10, 0 10"
          stroke="#9fc8b6" stroke-width="1.4" stroke-opacity="0.95"/>
    <!-- head + tongue -->
    <circle cx="0" cy="-126" r="3.2" fill="#9fc8b6" stroke="none"/>
    <path d="M0 -130 l4 -6 M0 -130 l-4 -6" stroke="#9fc8b6" stroke-width="1"/>
    <!-- subtle orbit -->
    <circle cx="0" cy="-30" r="118" stroke="#e9e2cf" stroke-opacity="0.08" stroke-width="0.6"/>
  </g>
</svg>
